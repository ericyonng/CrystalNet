# Desc:配置

# 核心配置不热重载(为了性能)
KernelConfig:
  # 网络配置(不进行热重载),如果连接器与数据传输器不共用Poller那么网络线程数是两者相加, 如果共用那么网络线程数取两者最大数量
  NetConfig:
    # 是否启用网络
    Enable: true
    # 连接器配置
    Linker:
      # 定义连接器id, 如果id与数据传输器id一样说明连接器和数据传输器共用一个Poller
      Id: 2
      # 连接器数量
      Count: 1

    # 数据传输器配置
    DataTransfer:
      # id
      Id: 1
      # 数量
      Count: 4

    # 黑白名单模式:黑名单:拒绝, 白名单通过, 其他的也放行
    BlackWhiteListMode: 
      BlackList: true
      WhiteList: true
      AllowUnknown: true

    # 最大会话数量 0表示无限制
    MaxSessionQuantity: 100000

    # 收发包参数
    # 收包单包大小限制, 0表示不限制, 如果传参不指定, 则默认使用配置, 如果手动指定参数, 则使用参数的
    SessionRecvPacketContentLimit: 16777216
    # 发包单包大小限制 0表示不限制,如果传参不指定, 则默认使用配置, 如果手动指定参数, 则使用参数的
    SessionSendPacketContentLimit: 0
    # 单帧最大接收数据量 0表示不限制
    MaxRecvBytesPerFrame: 0
    # 单帧最大发送数据量 0表示不限制
    MaxSendBytesPerFrame: 0
    # 单帧最大处理连接数 0表示不限制
    MaxAcceptCountPerFrame: 1024
    # 包个数限速
    SessionRecvPacketSpeedLimit: 0
    # 会话限速单位毫秒数
    SessionRecvPacketSpeedTimeUnitMs: 1
    # 包堆叠上限
    SessionRecvPacketStackLimit: 1024


  # 垃圾回收参数
  # 所有分配器内存使用上限控制 4GB
  AllMemoryAlloctorTotalUpper: 4294967296

  # GC 时间间隔
  GCIntervalMs: 100

  # 设置中央内存收集器工作时间间隔
  CenterCollectorIntervalMs: 100
  # 设置中央收集器跨线程block合并数量达到限制唤醒收集器工作的数量 128 * 1024
  WakeupCenterCollectorMinBlockNum: 131072
  # 设置MergeMemoryBufferInfo队列达到数量时唤醒中央收集器 128 * 1024
  WakeupCenterCollectorMinMergeBufferInfoNum: 131072
  # 定时合并tls内存块间隔时间 1分钟
  MergeTlsMemoryBlockIntervalMs: 5000

  # 事件循环Poller配置
  # 预设的poller扫描时间间隔
  MaxPollerScanMilliseconds: 1
  
# app 配置 Application维护
ApplicationConfig:
  # 别名
  AliasName: gs
  # 主服务
  ProjectMainServiceName: TestSuit
  # 禁用控制台监控信息
  DisableConsoleMonitorInfo: false
  
# 服务公共配置项 service proxy 维护
ServiceCommon:
  # 激活的服务 填入想要激活的服务项名称
  ActiveServiceItem: [TestSuit]
  
# testsuit配置(会动态热更)
TestSuit:
  # service层poller扫描间隔(不小于20ms)
  PollerMaxSleepMilliseconds: 20
  # 帧更新间隔(调用组件update)
  FrameUpdateTimeMs: 50
  # 用户连入端口
  UserLinkinPort: [3900]
  # 监听信息
  TcpListenList:
      # ip
    - BindTo: 0.0.0.0
      # 端口
      Port: 3900
      # 协议: CRYSTAL_PROTOCOL, JSON等系统支持的类型
      Protocol: CRYSTAL_PROTOCOL
      # 每个包是否设置接收包上限
      PacketRecvBytesLimitSwitch: true
      # 每个包是否设置发送包上限
      PacketSendBytesLimitSwitch: true
      # 包速率限制开关
      PacketSpeedLimitSwitch: true
      # 监听该端口的session数量, 同一个端口多个session监听可以多线程负载均衡, 在linux下才可以, 因为Linux下有ReusePort选项，windows下最多只能是1
      ListenSessionCount: 1
      
    - BindTo: 0.0.0.0
      Port: 3901
      # 协议: CRYSTAL_PROTOCOL, JSON等系统支持的类型
      Protocol: JSON
      # 每个包是否设置包上限, 开启的话会根据Kernel的包上限限制上行单包大小 SessionRecvPacketContentLimit
      PacketRecvBytesLimitSwitch: true
      # 每个包是否设置发送包上限
      PacketSendBytesLimitSwitch: true
      # 包速率限制开关
      PacketSpeedLimitSwitch: true
      # 监听该端口的session数量, 同一个端口多个session监听可以多线程负载均衡, 在linux下才可以, 因为Linux下有ReusePort选项，windows下最多只能是1
      ListenSessionCount: 1
      
    - BindTo: 0.0.0.0
      Port: 3902
      # 协议: CRYSTAL_PROTOCOL, JSON等系统支持的类型
      Protocol: CRYSTAL_PROTOCOL
      # 每个包是否设置包上限, 开启的话会根据Kernel的包上限限制上行单包大小 SessionRecvPacketContentLimit
      PacketRecvBytesLimitSwitch: false
      # 每个包是否设置发送包上限
      PacketSendBytesLimitSwitch: false
      # 包速率限制开关
      PacketSpeedLimitSwitch: false
      # 监听该端口的session数量, 同一个端口多个session监听可以多线程负载均衡, 在linux下才可以, 因为Linux下有ReusePort选项，windows下最多只能是1
      ListenSessionCount: 1

  # 是否开启网络协议打印
  ProtoStackOpenLog: true
  
  # 默认的存储数据库
  DefaultStorage: RpgMysql
  # 数据库版本号, 跨版本号清档数据
  DbVersion: 49
  # 系统使用operator uid, operator uid用于多线程下的负载均衡
  SystemOperatorUid: 0
  # 数据清洗时间间隔
  PurgeIntervalMs: 3000
  
  # 系统表MysqlMgr表禁用自动清库
  DisableSystemTableAutoDrop: true
  # 用清库功能 用于线上, 线上不可以自动清库，线上必须设置成1, 只能修数据 TODO:
  DisableAutoDropDB: true
  
  # UserLruLimit lru容量限制
  UserLruCapacityLimit: 1000
  # 配置表数据目录
  ConfigDataPath: ./Cfgs
  # 密钥 公钥使用PKC8
  RsaPrivateKey: 
  RsaPublicKey: 
  # 协议加密key过期时间
  EncryptKeyExpireTime: 3000
  # 热更集 hotfixkey
  PluginHotfixKey: TestPlugin
  
# mysql数据库配置
RpgMysql:
  # 数据库地址
  Host: 127.0.0.1
  # 数据库名
  DB: TestSuit
  # 用户名
  User: root
  # 密码
  Pwd: 123456
  # 端口
  Port: 3306
  # 绑定ip
  BindIp: 127.0.0.1
  # 数据库编码
  CharacterSet: utf8mb4
  # 数据库编码
  COLLATE: utf8mb4_bin
  # 自动重连
  AutoReconnect: 1
  # mysql 包缓冲区最大单包大小 2GB
  MaxPacketSize: 2147483648
  # 开启一次执行多条sql 一般用于开启手动事务批量执行sql
  EnableMultiStatements: true
  # 网络断开sql重复执行次数
  RetryTimesWhenNetInterrupt: 10
  # 线程数量,每个线程一个 mysql 连接
  DbThreadNum: 1
  # ping时间间隔, 维持mysql连接活跃
  PingIntervalSeconds: 3600
    
    
    
MysqlCommon:
  # 默认初始blob字段大小 64字节
  DefaultBlobOriginSize: 16
  # 初始string key大小 VARCHAR(256)
  DefaultStringKeyOriginSize: 64
  